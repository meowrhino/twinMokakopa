<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Básico -->
    <title>Ana López</title>
    <meta name="description" content="Portfolio de proyectos artísticos de Ana López: grabado al aguafuerte, óleo, acuarela, dibujo.">
    <meta name="keywords" content="ana lópez, ana lopez serrano, arte, portfolio, grabado, aguafuerte, óleo, acuarela, dibujo, arte contemporáneo">
    <meta name="author" content="meowrhino.studio">
    <meta name="robots" content="index, follow">
    <meta name="language" content="Spanish">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.analopezserrano.com/">
    <meta property="og:title" content="Ana López">
    <meta property="og:description" content="Portfolio de proyectos artísticos de Ana López: grabado al aguafuerte, óleo, acuarela, dibujo.">
    <meta property="og:image" content="https://www.analopezserrano.com/data/teatroPlantas/carasol/1.jpg">
    <meta property="og:locale" content="es_ES">
    <meta property="og:locale:alternate" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://www.analopezserrano.com/">
    <meta name="twitter:title" content="Ana López">
    <meta name="twitter:description" content="Portfolio de proyectos artísticos de Ana López: grabado al aguafuerte, óleo, acuarela, dibujo.">
    <meta name="twitter:image" content="https://www.analopezserrano.com/data/teatroPlantas/carasol/1.jpg">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.analopezserrano.com/">

    <!-- Favicon / Navicon -->
    <link rel="icon" type="image/png" href="data/navicon.png">
    <link rel="apple-touch-icon" href="data/navicon.png">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Structured Data / Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ana López",
      "url": "https://www.analopezserrano.com/",
      "description": "portfolio de proyectos artísticos de Ana López",
      "author": {
        "@type": "Person",
        "name": "Ana López"
      },
      "creator": {
        "@type": "Organization",
        "name": "meowrhino.studio",
        "url": "https://meowrhino.studio"
      },
      "inLanguage": ["es", "en", "ca"]
    }
    </script>
</head>
<body>

    <!-- Header: nombre (sin idiomas, se mueven al about) -->
    <div id="site-header">
        <div id="site-name">ana lópez</div>
    </div>

    <!-- About overlay (velo) -->
    <div id="about-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="about-title">
        <div id="about-content">
            <h2 id="about-title"></h2>
            <p class="about-subtitle"></p>
            <div id="about-text"></div>
            <div id="about-switch">
                <span class="active" data-view="statement">Statement</span>
                <span data-view="cv">CV</span>
            </div>
            <div class="lang-switch"></div>
            <div id="about-contact"></div>
            <div class="about-footer"></div>
        </div>
        <button id="close-about" aria-label="cerrar">×</button>
    </div>

    <!-- Menú de proyectos (abajo derecha) -->
    <!-- #menu: todos los links con blend mode difference -->
    <nav id="menu"></nav>
    <!-- #menu-active: solo el link activo, sin blend mode, encima -->
    <nav id="menu-active"></nav>

    <!-- Barra de navegación de imágenes (bottom center, única y fija) -->
    <div id="global-scrollbar-track" class="scrollbar-track">
        <div id="global-scrollbar-thumb" class="scrollbar-thumb"></div>
    </div>

    <!-- Contenedor de proyectos -->
    <main id="projects-container"></main>

    <!-- Script principal -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
